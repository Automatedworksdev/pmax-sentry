<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>PMax Sentry</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="license-view" class="license-view">
    <img src="images/icon128.png" class="logo">
    <h1>PMax Sentry</h1>
    <input type="text" id="license-key" placeholder="Enter license key">
    <button id="validate-license-btn">Activate</button>
  </div>

  <div id="dashboard-view" class="hidden">
    <!-- Header with Active Badge -->
    <div class="premium-header">
      <div class="header-wrapper">
        <img src="images/icon128.png" class="header-logo">
        <h1>PMax Sentry</h1>
        <p>Intelligence Engine</p>
      </div>
      <div class="header-actions">
        <span class="header-status">✓ Active</span>
        <button id="sync-btn">🔄</button>
      </div>
    </div>
    
    <!-- 3 Card Stats -->
    <div class="dash-stats">
      <div class="stat-box">
        <span class="stat-num" id="channel-count">51,448</span>
        <span class="stat-label">Verified Sources</span>
      </div>
      <div class="stat-box">
        <span class="stat-num">v3.0</span>
        <span class="stat-label">Version</span>
      </div>
      <div class="stat-box">
        <span class="stat-num" id="last-sync">--</span>
        <span class="stat-label">Synced</span>
      </div>
    </div>
    
    <!-- Actions -->
    <div class="dash-actions">
      <button id="scan-btn">Scan Placements</button>
      <button id="save-btn">Save Report</button>
    </div>
    
    <!-- Results -->
    <div id="tier1-section"></div>
    <div id="tier2-section"></div>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
