<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PMax Sentry v3.0</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .hero-stat { background: linear-gradient(135deg, #1e3a5f 0%, #0d2137 100%); color: white; padding: 20px; border-radius: 8px; text-align: center; margin: 15px 0; }
    .hero-number { font-size: 36px; font-weight: 800; color: #60a5fa; }
    .hero-label { font-size: 12px; text-transform: uppercase; letter-spacing: 1px; margin-top: 5px; color: #94a3b8; }
    .hero-sub { font-size: 11px; color: #64748b; margin-top: 3px; }
    .tagline { font-size: 12px; color: #64748b; text-align: center; margin-bottom: 15px; font-style: italic; }
  </style>
</head>
<body>
  <div id="license-view" class="license-view">
    <img src="images/icon128.png" alt="PMax Sentry" class="logo">
    <h1>PMax Sentry</h1>
    <p class="subtitle">Intelligence Engine v3.0</p>
    <div class="card">
      <h3>Activate License</h3>
      <input type="text" id="license-key" class="input" placeholder="PMX-XXXX-XXXX-XXXX">
      <button id="validate-license-btn" class="btn">Activate</button>
      <div id="license-status" class="status-text"></div>
    </div>
  </div>

  <div id="dashboard-view" class="dashboard-view hidden">
    <div class="premium-header">
      <div class="header-wrapper">
        <img src="images/icon128.png" alt="PMax Sentry" class="header-logo">
        <h1 class="header-title">PMax Sentry</h1>
        <p class="header-version">Intelligence Engine</p>
        <p class="tagline">Vetting against 51,448 verified waste sources</p>
      </div>
    </div>
    
    <div class="hero-stat">
      <div class="hero-number" id="channel-count">51,448</div>
      <div class="hero-label">Verified Waste Sources</div>
      <div class="hero-sub">Intelligence Engine Active</div>
    </div>
    
    <div id="status" class="dash-status">Ready to scan</div>
    
    <div class="dash-actions">
      <button id="scan-btn" class="dash-btn dash-btn-primary">Scan Placements</button>
      <button id="save-btn" class="dash-btn dash-btn-secondary">Save Report</button>
    </div>
    
    <div id="tier1-section" class="result-section">
      <div class="section-header">
        <h3><span class="badge tier1">Confirmed Waste</span></h3>
        <input type="checkbox" id="select-all-tier1" class="select-all-checkbox" checked>
      </div>
      <ul id="tier1-list" class="placement-list"></ul>
    </div>
    
    <div id="tier2-section" class="result-section">
      <div class="section-header">
        <h3><span class="badge tier2">Suspected Waste</span></h3>
        <input type="checkbox" id="select-all-tier2" class="select-all-checkbox" checked>
      </div>
      <ul id="tier2-list" class="placement-list"></ul>
    </div>
    
    <div class="category-breakdown" id="category-breakdown"></div>
    
    <div class="footer-actions">
      <button id="block-waste-btn" class="footer-btn footer-btn-primary" disabled>Block Waste</button>
      <button id="feed-sentry-btn" class="footer-btn footer-btn-outline">Feed the Sentry</button>
    </div>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
