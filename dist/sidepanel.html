<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PMax Sentry v2.2</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- License View -->
  <div id="license-view" class="view">
    <div class="header">
      <img src="icons/icon48.png" alt="PMax Sentry" class="logo">
      <h2>PMax Sentry</h2>
      <p class="version">v2.2 - Intelligence Engine</p>
    </div>
    
    <div class="card">
      <h3>Activate License</h3>
      <p style="font-size:12px;color:#5f6368;margin-bottom:12px;">
        Enter your license key to activate PMax Sentry.
      </p>
      <input type="text" id="license-key" placeholder="PMX-XXXX-XXXX-XXXX" class="input">
      <button id="validate-license-btn" class="btn btn-primary">Activate</button>
      <div id="license-status" class="status-text"></div>
    </div>
  </div>
  
  <!-- Dashboard View -->
  <div id="dashboard-view" class="view hidden">
    <div class="header">
      <img src="icons/icon48.png" alt="PMax Sentry" class="logo-small">
      <div>
        <h2>PMax Sentry</h2>
        <p class="version">v2.2 - Intelligence Engine</p>
      </div>
    </div>
    
    <!-- Data Stats -->
    <div class="stats-bar">
      <div class="stat">
        <span class="stat-label">Channels</span>
        <span id="channel-count" class="stat-value">0</span>
      </div>
      <div class="stat">
        <span class="stat-label">Version</span>
        <span id="data-version" class="stat-value">2.1</span>
      </div>
      <div class="stat">
        <span class="stat-label">Synced</span>
        <span id="last-sync" class="stat-value">Never</span>
      </div>
    </div>
    
    <!-- Status -->
    <div id="status" class="status">Ready to scan</div>
    
    <!-- Actions -->
    <div class="actions">
      <button id="scan-btn" class="btn btn-primary">
        <span class="btn-text">Scan Placements</span>
        <span class="spinner hidden">⏳</span>
      </button>
      <button id="exclude-btn" class="btn btn-danger" disabled>Exclude All</button>
      <button id="save-btn" class="btn btn-secondary" disabled>Save Report</button>
      <button id="refresh-btn" class="btn btn-secondary">🔄 Refresh Data</button>
    </div>
    
    <!-- Tier 1: Confirmed -->
    <div class="card">
      <div class="card-header">
        <h3 class="tier1-title">🔴 Confirmed Waste</h3>
        <div class="counts">
          <span id="tier1-count" class="count">0</span>
          <span id="tier1-spend" class="spend">£0.00</span>
        </div>
      </div>
      <ul id="tier1-list" class="placement-list"></ul>
    </div>
    
    <!-- Tier 2: Suspected -->
    <div class="card">
      <div class="card-header">
        <h3 class="tier2-title">🟡 Suspected Waste</h3>
        <label class="toggle">
          <input type="checkbox" id="toggle-suspected" checked>
          <span class="toggle-label">Show</span>
        </label>
        <div class="counts">
          <span id="tier2-count" class="count">0</span>
          <span id="tier2-spend" class="spend">£0.00</span>
        </div>
      </div>
      <ul id="tier2-list" class="placement-list"></ul>
    </div>
    
    <!-- Category Breakdown -->
    <div class="card">
      <div class="card-header">
        <h3>📊 Category Breakdown</h3>
      </div>
      <div id="category-breakdown"></div>
    </div>
  </div>
  
  <!-- Toast -->
  <div id="toast" class="toast hidden">
    <span id="toast-message"></span>
  </div>
  
  <script src="sidepanel.js"></script>
</body>
</html>
