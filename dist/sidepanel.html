<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>PMax Sentry</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f172a; color: white; min-height: 100vh; }
    .container { padding: 16px; }
    .header { text-align: center; padding: 12px 0; border-bottom: 1px solid #1e293b; }
    .logo { width: 48px; height: 48px; margin-bottom: 8px; }
    .title { font-size: 18px; font-weight: 700; margin: 0; }
    .subtitle { font-size: 11px; color: #64748b; margin-top: 2px; }
    
    .hero-stat { 
      background: linear-gradient(135deg, #1e3a5f 0%, #0f172a 100%); 
      border: 1px solid #334155; 
      border-radius: 8px; 
      padding: 20px; 
      text-align: center; 
      margin: 16px 0;
    }
    .hero-number { 
      font-size: 42px; 
      font-weight: 800; 
      background: linear-gradient(135deg, #60a5fa 0%, #3b82f6 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .hero-label { font-size: 12px; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; margin-top: 4px; }
    .hero-sub { font-size: 11px; color: #64748b; margin-top: 6px; }
    
    .status { text-align: center; font-size: 12px; color: #64748b; margin: 12px 0; }
    
    .actions { display: flex; gap: 8px; margin-top: 16px; }
    .btn { flex: 1; padding: 12px; border: none; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; }
    .btn-primary { background: #3b82f6; color: white; }
    .btn-secondary { background: #1e293b; color: #94a3b8; border: 1px solid #334155; }
    
    .sections { margin-top: 16px; }
    .section-header { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #1e293b; }
    .badge { padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
    .badge-tier1 { background: #dc2626; color: white; }
    .badge-tier2 { background: #f59e0b; color: black; }
    
    #license-view { padding: 40px 16px; text-align: center; }
    .input { width: 100%; padding: 12px; margin: 16px 0; border: 1px solid #334155; border-radius: 6px; background: #1e293b; color: white; font-size: 14px; box-sizing: border-box; }
    .input::placeholder { color: #64748b; }
    
    .hidden { display: none; }
  </style>
</head>
<body>
  <div id="license-view">
    <img src="images/icon128.png" class="logo" alt="Logo">
    <div class="title">PMax Sentry</div>
    <div class="subtitle">Intelligence Engine v3.0</div>
    <input type="text" id="license-key" class="input" placeholder="Enter license key">
    <button id="activate-btn" class="btn btn-primary">Activate</button>
    <div id="license-error" style="color: #ef4444; margin-top: 12px; font-size: 12px;"></div>
  </div>

  <div id="dashboard-view" class="hidden">
    <div class="container">
      <div class="header">
        <img src="images/icon128.png" class="logo" alt="Logo">
        <div class="title">PMax Sentry</div>
        <div class="subtitle">Intelligence Engine</div>
      </div>
      
      <div class="hero-stat">
        <div class="hero-number" id="channel-count">51,448</div>
        <div class="hero-label">Intelligence Records Active</div>
        <div class="hero-sub">Vetting against verified waste sources</div>
      </div>
      
      <div class="status" id="status-text">Ready to scan</div>
      
      <div class="actions">
        <button id="scan-btn" class="btn btn-primary">Scan</button>
        <button id="save-btn" class="btn btn-secondary">Export</button>
      </div>
      
      <div class="sections">
        <div id="results-container"></div>
      </div>
    </div>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
