<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PMax Sentry v2.2 - Intelligence Engine</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- LICENSE VIEW -->
  <div id="license-view" class="license-view view">
    
    <!-- Logo -->
    <img src="icons/icon48.png" alt="PMax Sentry" class="logo" onerror="this.style.display='none'">
    
    <!-- Brand -->
    <h1>PMax Sentry</h1>
    <p class="subtitle">Intelligence Engine v2.2</p>
    
    <!-- Activation Card -->
    <div class="card">
      <h3>Activate License</h3>
      <p class="description">
        Enter your license key to activate the Intelligence Engine
      </p>
      
      <input 
        type="text" 
        id="license-key" 
        class="input" 
        placeholder="PMX-XXXX-XXXX-XXXX"
        autocomplete="off"
        spellcheck="false"
      >
      
      <button id="validate-license-btn" class="btn">
        <span id="btn-text">Activate</span>
        <span id="btn-spinner" class="spinner hidden"></span>
      </button>
      
      <div id="license-status" class="status-text"></div>
    </div>
    
    <!-- Help -->
    <div class="help-text">
      <p>Need a license key? Contact your account manager</p>
    </div>
    
  </div>

  <!-- DASHBOARD VIEW (Hidden initially) -->
  <div id="dashboard-view" class="dashboard-view view hidden">
    <div style="padding: 20px;">
      <h2>Dashboard</h2>
      <button id="scan-btn">Scan Placements</button>
    </div>
    
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
