<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>PMax Sentry - Test</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; max-width: 400px; margin: 0 auto; }
    input { width: 100%; padding: 10px; font-size: 16px; margin: 10px 0; }
    button { width: 100%; padding: 12px; font-size: 16px; background: #1a73e8; color: white; border: none; border-radius: 4px; cursor: pointer; }
    button:hover { background: #1557b0; }
    #result { margin-top: 20px; padding: 10px; border-radius: 4px; }
    .success { background: #e6f4ea; color: #137333; }
    .error { background: #fce8e8; color: #c5221f; }
  </style>
</head>
<body>
  <h1>🔒 PMax Sentry Test</h1>
  <p>Enter any key starting with PMX-</p>
  
  <input type="text" id="license-key" placeholder="PMX-TEST-TEST-TEST">
  <button id="activate">Activate License</button>
  
  <div id="result"></div>
  
  <script>
    document.getElementById('activate').addEventListener('click', async () => {
      const key = document.getElementById('license-key').value.trim();
      const result = document.getElementById('result');
      
      result.textContent = 'Testing...';
      result.className = '';
      
      try {
        // Test if we can talk to background script
        const response = await new Promise((resolve) => {
          chrome.runtime.sendMessage({ action: 'ping' }, (resp) => {
            if (chrome.runtime.lastError) {
              resolve({ error: chrome.runtime.lastError.message });
            } else {
              resolve(resp);
            }
          });
        });
        
        console.log('Ping response:', response);
        
        if (response.error) {
          result.textContent = 'Error: ' + response.error;
          result.className = 'error';
          return;
        }
        
        // Now try license validation
        const validateResponse = await new Promise((resolve) => {
          chrome.runtime.sendMessage({ action: 'validateLicense', key }, (resp) => {
            if (chrome.runtime.lastError) {
              resolve({ error: chrome.runtime.lastError.message });
            } else {
              resolve(resp);
            }
          });
        });
        
        console.log('Validate response:', validateResponse);
        
        if (validateResponse.valid) {
          result.textContent = '✓ License activated!';
          result.className = 'success';
        } else {
          result.textContent = '❌ ' + (validateResponse.error || 'Unknown error');
          result.className = 'error';
        }
        
      } catch (err) {
        result.textContent = '❌ Exception: ' + err.message;
        result.className = 'error';
        console.error(err);
      }
    });
  </script>
</body>
</html>
